<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}systor{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=0.6.3">
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>systor<span>.</span></h1>
    <div class="sub">system monitor</div>
  </div>
  <div class="actions">
    <nav class="page-tabs">
      <a href="/" class="page-tab {% if request.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/apps" class="page-tab {% if request.path == '/apps' %}active{% endif %}">Apps</a>
      <a href="/network" class="page-tab {% if request.path == '/network' %}active{% endif %}">Network</a>
      <a href="/alerts" class="page-tab {% if request.path == '/alerts' %}active{% endif %}">Alerts</a>
      <a href="/logs" class="page-tab {% if request.path == '/logs' %}active{% endif %}">Logs</a>
      <a href="/settings" class="page-tab {% if request.path.startswith('/settings') %}active{% endif %}">Settings</a>
    </nav>
  </div>
</div>
<div class="container">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
