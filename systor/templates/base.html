<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}systor{% endblock %}</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}?v=2">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.min.css') }}?v=1.4">
</head>
<body>
<div class="header" role="banner">
  <div class="header-left">
    <div class="brand-row">
      <img class="brand-logo" src="{{ url_for('static', filename='img/systor-logo-header.png') }}?v=2" alt="systor logo">
      <h1 aria-label="systor home">systor<span>.</span></h1>
      <div class="sub" id="global-header-meta">loading monitor…</div>
    </div>
  </div>
  <div class="actions">
    <nav class="page-tabs" role="navigation" aria-label="Main pages">
      <a href="/" class="page-tab {% if request.path == '/' %}active{% endif %}" aria-label="Dashboard" title="Dashboard"><span class="tab-icon" aria-hidden="true">⌂</span><span class="tab-label">Dashboard</span></a>
      <a href="/apps" class="page-tab {% if request.path == '/apps' %}active{% endif %}" aria-label="Apps" title="Apps"><span class="tab-icon" aria-hidden="true">◫</span><span class="tab-label">Apps</span></a>
      <a href="/network" class="page-tab {% if request.path == '/network' %}active{% endif %}" aria-label="Network" title="Network"><span class="tab-icon" aria-hidden="true">⇄</span><span class="tab-label">Network</span></a>
      <a href="/speed" class="page-tab {% if request.path == '/speed' %}active{% endif %}" aria-label="Speed" title="Speed"><span class="tab-icon" aria-hidden="true">⚡</span><span class="tab-label">Speed</span></a>
      <a href="/alerts" class="page-tab {% if request.path == '/alerts' %}active{% endif %}" aria-label="Alerts" title="Alerts"><span class="tab-icon" aria-hidden="true">⚠</span><span class="tab-label">Alerts</span></a>
      <a href="/logs" class="page-tab {% if request.path == '/logs' %}active{% endif %}" aria-label="Logs" title="Logs"><span class="tab-icon" aria-hidden="true">≣</span><span class="tab-label">Logs</span></a>
      <a href="/settings" class="page-tab {% if request.path.startswith('/settings') %}active{% endif %}" aria-label="Settings" title="Settings"><span class="tab-icon" aria-hidden="true">⚙</span><span class="tab-label">Settings</span></a>
    </nav>
  </div>
</div>
<div class="container" id="main-content">
  {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
<script>
(function(){
  const el = document.getElementById('global-header-meta');
  if(!el) return;
  function fmt(n, unit){ if(n===null||n===undefined||Number.isNaN(Number(n))) return '—'; const v=Number(n); const s=Math.abs(v)>=100?v.toFixed(0):Math.abs(v)>=10?v.toFixed(1):v.toFixed(2); return s+(unit?' '+unit:''); }
  async function getJSON(url){ const r=await fetch(url,{cache:'no-store'}); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }
  async function update(){
    try{
      const [snap, runtime] = await Promise.all([getJSON('/api/snapshot'), getJSON('/api/runtime')]);
      const cpu=snap.cpu||{}, mem=snap.memory||{}, web=runtime.web||{}, collector=runtime.collector||{}, st=runtime.storage||{};
      const memPct=mem.total_mb?Math.round(100*mem.used_mb/mem.total_mb):null;
      el.innerHTML = `<span class="header-chip"><span class="chip-k cpu-chip">CPU</span><strong>${fmt(cpu.percent,'%')}</strong></span><span class="header-chip"><span class="chip-k temp-chip">Temp</span><strong>${fmt(cpu.temp_c,'°C')}</strong></span><span class="header-chip"><span class="chip-k load-chip-mini">Load</span><strong>${fmt(cpu.load_1m)}</strong></span><span class="header-chip"><span class="chip-k ram-chip">RAM</span><strong>${memPct===null?'—':memPct+'%'}</strong></span><span class="header-sep">·</span><span class="header-chip"><span class="chip-k sys-chip">CPU</span><strong>W ${fmt(web.cpu_percent,'%')} · C ${fmt(collector.cpu_percent,'%')}</strong></span><span class="header-chip"><span class="chip-k sys-chip">RAM</span><strong>W ${fmt(web.rss_mb,'MB')} · C ${fmt(collector.rss_mb,'MB')}</strong></span><span class="header-chip"><span class="chip-k disk-chip">Disk</span><strong>${fmt(st.total_mb,'MB')}</strong></span>`;
    } catch(e) { /* keep fallback text */ }
  }
  update(); setInterval(update, 15000);
})();
</script>
</body>
</html>
