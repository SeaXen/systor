{% extends "base.html" %}
{% block title %}systor · Logs{% endblock %}
{% block content %}
<div class="page-title">Logs</div>
<div class="text-muted" style="font-size:12px;margin-bottom:14px">
  Last 200 lines from <code class="mono">{{ log_path }}</code>
</div>
<div class="log-view" id="log-view">Loading…</div>
{% endblock %}
{% block scripts %}
<script>
async function fetchJSON(url) { const r = await fetch(url); return r.json(); }
async function loadLogs() {
  const data = await fetchJSON('/logs/raw?lines=200');
  document.getElementById('log-view').textContent =
    (data && data.length) ? data.join('\n') : '(log is empty)';
}
loadLogs();
setInterval(loadLogs, 5000);
</script>
{% endblock %}
