{% extends "base.html" %}
{% block title %}systor · Login{% endblock %}
{% block content %}
<div class="settings-page" style="max-width:560px;margin:0 auto;">
  <div class="settings-card">
    <h3>Admin login</h3>
    <div class="card-subtle">Single-admin access for private Systor pages. Public/tunnel dashboard rules stay separate.</div>
    {% if error %}
    <div class="history-item" style="border-color:rgba(255,107,129,.35);color:#ffb4bf;">{{ error }}</div>
    {% endif %}
    <form method="post" class="notif-field-grid compact-top">
      <input type="hidden" name="next" value="{{ next_url or '/' }}">
      <label>Username</label>
      <input type="text" name="username" value="{{ auth_username or 'admin' }}" autocomplete="username" required>
      <label>Password</label>
      <input type="password" name="password" value="" autocomplete="current-password" required>
      <label></label>
      <div class="notif-actions">
        <button type="submit" class="btn compact">Login</button>
        <a href="/" class="btn secondary compact">Back</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
